[project]
name = "lobe"
version = "0.1.0"
description = "Policy training and serving for limb robot control"
requires-python = ">=3.11,<3.12"
dependencies = [
    "lerobot[pi,xvla,wallx]",
    "huggingface-hub",
    "wandb",
    "tyro>=1.0.8",
    "loguru>=0.7.3",
]

[project.optional-dependencies]
serve = [
    "websockets",
    "msgpack",
    "msgpack-numpy",
]
ot = [
    "torchcfm",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
line-length = 119

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N"]

[dependency-groups]
dev = [
    "ruff>=0.15.5",
]
